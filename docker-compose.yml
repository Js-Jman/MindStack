services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: mindstack-app
    container_name: mindstack-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://52.237.120.94:3000
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-mindstack_user}:${MYSQL_PASSWORD:-mindstack_secure_2026}@${MYSQL_PRIVATE_IP:-172.30.0.10}:3306/${MYSQL_DATABASE:-mindstack}
    ports:
      - "3000:3000"
    networks:
      mindstack_net:
        ipv4_address: 172.30.0.20

  mysql:
    image: mysql:8.0
    container_name: mindstack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mindstack_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mindstack}
      MYSQL_USER: ${MYSQL_USER:-mindstack_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mindstack_secure_2026}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    expose:
      - "3306"
    networks:
      mindstack_net:
        ipv4_address: ${MYSQL_PRIVATE_IP:-172.30.0.10}

  nginx:
    image: nginx:stable
    container_name: mindstack-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      mindstack_net:
        ipv4_address: 172.30.0.30

volumes:
  mysql_data:

networks:
  mindstack_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
